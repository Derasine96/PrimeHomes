<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrimeHomes Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── COLOURS ── */
    :root {
      --bg:          #2a2a38;
      --surface:     #111118;
      --surface2:    #18181f;
      --border:      #25253a;
      --accent:      #7c6dfa;
      --accent-soft: rgba(124, 109, 250, 0.12);
      --text:        #e6e6f0;
      --muted:       #66668a;
      --green:       #3ddba0;
      --user-bubble: #7c6dfa;
      --bot-bubble:  #18181f;
    }

    /* ── PAGE ── */
    body {
      font-family: 'DM Sans', Arial, sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Ambient glow behind chat box */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(124, 109, 250, 0.10) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── CHAT BOX ── */
    .chat-box {
      position: relative;
      z-index: 1;
      width: 460px;
      height: 680px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #b06dfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info h2 {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .header-info p {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Online dot */
    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--green);
      font-weight: 500;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2.5s ease-in-out infinite;
    }

    /* ── MESSAGES AREA ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── GREETING CARD ── */
    .greeting-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .greeting-card .icon { font-size: 2rem; margin-bottom: 10px; }

    .greeting-card h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .greeting-card p {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Quick question chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      margin-top: 14px;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.72rem;
      padding: 5px 12px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.18s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-soft);
    }

    /* ── WELCOME SCREEN (shown before chat starts) ── */
    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 28px;
      text-align: center;
      gap: 18px;
    }

    .welcome-screen .icon {
      font-size: 2.4rem;
    }

    .welcome-screen h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    .welcome-screen p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 280px;
    }

    .welcome-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    .welcome-form input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .welcome-form input::placeholder { color: var(--muted); }

    .welcome-form input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .welcome-form button {
      background: linear-gradient(135deg, var(--accent), #b06dfa);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.18s;
    }

    .welcome-form button:hover { opacity: 0.88; }
    .welcome-form button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── MESSAGE BUBBLES ── */
    .message {
      display: flex;
      gap: 9px;
      animation: rise 0.28s ease both;
    }

    .message.user { flex-direction: row-reverse; }

    .msg-icon {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.bot .msg-icon {
      background: linear-gradient(135deg, var(--accent), #b06dfa);
    }

    .message.user .msg-icon {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.855rem;
      line-height: 1.65;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    /* ── TYPING INDICATOR ── */
    .typing-row {
      display: flex;
      gap: 9px;
      animation: rise 0.28s ease both;
    }

    .typing-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 3px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.1s infinite ease-in-out;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 14px 16px 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 9px;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      padding: 4px 0;
    }

    .input-row input::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.18s, transform 0.18s;
    }

    .send-btn:hover  { opacity: 0.85; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    .send-btn svg { width: 15px; height: 15px; color: #fff; }

    .input-hint {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 9px;
      opacity: 0.6;
    }

    /* ── ANIMATIONS ── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-5px); }
    }
  </style>
</head>

<body>
  <div class="chat-box">

    <!-- HEADER -->
    <div class="header">
      <div class="header-logo">🏠</div>
      <div class="header-info">
        <h2>PrimeHomes Assistant</h2>
        <p>Your AI property consultant</p>
      </div>
      <div class="header-status">
        <div class="status-dot"></div>
        Online
      </div>
    </div>

    <!-- WELCOME SCREEN — shown first, collects name + location -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="icon">🏠</div>
      <h3>Welcome to PrimeHomes</h3>
      <p>Before we get started, tell us a little about you so we can personalize your experience.</p>
      <div class="welcome-form">
        <input type="text" id="visitorName" placeholder="Your name" onkeydown="if(event.key === 'Enter') startChat()" />
        <input type="text" id="visitorLocation" placeholder="Where are you chatting from?" onkeydown="if(event.key === 'Enter') startChat()" />
        <button id="startChatBtn" onclick="startChat()">Start Chat</button>
      </div>
    </div>

    <!-- MESSAGES — hidden until the welcome form is submitted -->
    <div class="messages" id="messages" style="display: none;"></div>

    <!-- INPUT — hidden until the welcome form is submitted -->
    <div class="input-area" id="inputArea" style="display: none;">
      <div class="input-row">
        <input
          type="text"
          id="questionInput"
          placeholder="Ask about properties, pricing, viewings..."
          onkeydown="if(event.key === 'Enter') sendMessage()"
        />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <p class="input-hint">Enter to send &nbsp;·&nbsp; Powered by PrimeHomes AI</p>
    </div>

  </div>

  <script>
    // ── YOUR MAKE.COM WEBHOOK URL ──
    const WEBHOOK_URL = "https://hook.eu2.make.com/bbt7juiekpjj6ndlcdu8kcbawwyb529e";

    // ── SESSION ID ──
    let sessionId = sessionStorage.getItem("sessionId");
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      sessionStorage.setItem("sessionId", sessionId);
    }

    // ── VISITOR INFO (collected on the welcome screen) ──
    let visitorName = "";
    let visitorLocation = "";

    // ── START CHAT — runs when the welcome form is submitted ──
    function startChat() {
      const nameInput     = document.getElementById("visitorName");
      const locationInput = document.getElementById("visitorLocation");

      visitorName     = nameInput.value.trim();
      visitorLocation = locationInput.value.trim();

      // Name is required, location is optional
      if (!visitorName) {
        nameInput.style.borderColor = "#ff6060";
        nameInput.focus();
        return;
      }

      // Hide the welcome screen, show the chat
      document.getElementById("welcomeScreen").style.display = "none";
      document.getElementById("messages").style.display = "flex";
      document.getElementById("inputArea").style.display = "block";

      // Personalized greeting from the assistant
      const greeting = visitorLocation
        ? `Welcome, ${visitorName}! 👋 Great to have someone chatting in from ${visitorLocation}. What can I help you find today — a property to view, pricing info, or anything else?`
        : `Welcome, ${visitorName}! 👋 What can I help you find today — a property to view, pricing info, or anything else?`;

      addBubble(greeting, "bot");
      document.getElementById("questionInput").focus();
    }

    // ── SEND MESSAGE ──
    async function sendMessage() {

      // 1. Get what the user typed
      const input    = document.getElementById("questionInput");
      const sendBtn  = document.getElementById("sendBtn");
      const question = input.value.trim();
      if (!question) return;

      // 2. Show the user's message in the chat
      addBubble(question, "user");
      input.value = "";
      sendBtn.disabled = true;

      // 3. Show typing indicator while waiting
      const typing = showTyping();

      // 4. Send the question to Make.com
      try {
        // Send to Make.com — includes visitor info so the AI can personalize replies
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: sessionId,
            name: visitorName,
            location: visitorLocation,
            question: question
          })
        });

        // 5. Read the answer that comes back
        const text = await response.text();
        let message = text;

        // Extract just the message field from Gemini's JSON response
        try {
          const json = JSON.parse(text);
          message = json.message || text;
        } catch (_) {}

        // 6. Remove typing indicator and show the answer
        typing.remove();
        addBubble(message, "bot");

      } catch (error) {
        typing.remove();
        addBubble("Something went wrong. Please try again in a moment.", "bot");

      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    // ── ADD A CHAT BUBBLE ──
    function addBubble(text, role) {
      const messages = document.getElementById("messages");

      const row = document.createElement("div");
      row.className = "message " + role;

      const icon = document.createElement("div");
      icon.className = "msg-icon";
      icon.textContent = role === "bot" ? "🏠" : "👤";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(icon);
      row.appendChild(bubble);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    // ── TYPING INDICATOR ──
    function showTyping() {
      const messages = document.getElementById("messages");

      const row = document.createElement("div");
      row.className = "typing-row";

      const icon = document.createElement("div");
      icon.className = "msg-icon";
      icon.style.background = "linear-gradient(135deg, #7c6dfa, #b06dfa)";
      icon.textContent = "🏠";

      const bubble = document.createElement("div");
      bubble.className = "typing-bubble";
      bubble.innerHTML = "<span></span><span></span><span></span>";

      row.appendChild(icon);
      row.appendChild(bubble);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
      return row;
    }
  </script>

</body>
</html>
